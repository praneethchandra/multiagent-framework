# Sequential pattern: a fixed pipeline of agents, with an optional loop
# around a subset of steps (here: draft <-> review, until the critic approves).
name: research-report-pipeline
pattern: sequential

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  apiKeyEnv: ANTHROPIC_API_KEY
  maxTokens: 1500
  temperature: 0.7

goal: "Explain the impact of microplastics on marine ecosystems"

agents:
  - id: researcher
    role: "Research Agent"
    description: "Gathers bullet-point research findings on a topic"
    promptFile: ../prompts/researcher.md
    # Each agent owns its own output bar: research notes must have real
    # substance before being handed to the writer.
    validate:
      type: rule
      rule: "output.length > 200"
      onFail: warn
  - id: writer
    role: "Writer Agent"
    description: "Turns research notes into a polished short report"
    promptFile: ../prompts/writer.md
  - id: critic
    role: "Critic Agent"
    description: "Reviews a draft report and approves it or requests changes"
    promptFile: ../prompts/critic.md

workflow:
  steps:
    - agent: researcher
      input: "{{goal}}"
      output: notes
    - agent: writer
      input: "Topic: {{goal}}\n\nResearch notes:\n{{notes}}\n\nCritic feedback from previous draft (empty if this is the first draft):\n{{review}}"
      output: draft
    - agent: critic
      input: "{{draft}}"
      output: review

  # Repeat the writer/critic exchange until the critic approves, or a
  # maximum of 3 iterations is reached -- this is the Adversarial-Verify
  # pattern (generator vs. critic, bounded convergence). `statusVar` records
  # whether it actually converged ("approved") or ran out of budget, so a
  # later step (or the CLI output) can tell the difference.
  loop:
    steps: [draft, review]
    until: "vars.review.includes('APPROVED')"
    maxIterations: 3
    onExhaustion: lastAttempt
    statusVar: loop_status
