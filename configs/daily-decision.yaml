# Daily decision-making helper (parallel pattern): three agents independently
# weigh in on a decision from different angles, then a synthesizer gives you
# one clear recommendation.
#
# Usage: edit the `goal` line below to whatever you're deciding today, then:
#   npm run run -- configs/daily-decision.yaml --output final_output
name: daily-decision-helper
pattern: parallel

llm:
  model: claude-sonnet-4-6
  apiKeyEnv: ANTHROPIC_API_KEY
  maxTokens: 800
  temperature: 0.7

goal: "Should I switch from my current apartment to one that's $300/month more but a 10 minute walk to work instead of a 40 minute commute?"

agents:
  - id: pragmatist
    description: "Evaluates a decision on time, money, effort, and logistics"
    promptFile: ../prompts/pragmatist.md
  - id: risk_analyst
    description: "Evaluates a decision for downside risk and reversibility"
    promptFile: ../prompts/risk_analyst.md
  - id: opportunity_scout
    description: "Evaluates a decision for upside and missed-opportunity cost"
    promptFile: ../prompts/opportunity_scout.md
  - id: decision_synthesizer
    description: "Combines multiple analyses into one final recommendation"
    promptFile: ../prompts/decision_synthesizer.md
    validate:
      type: rule
      rule: "output.toLowerCase().includes('do it') || output.toLowerCase().includes(\"don't\")"
      onFail: warn

parallel:
  agents: [pragmatist, risk_analyst, opportunity_scout]
  input: "{{goal}}"
  aggregator: decision_synthesizer
  output: final_output
